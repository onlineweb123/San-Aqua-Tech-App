<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>San Aqua Tech | Login & Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="San Aqua">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="theme-color" content="#0077b6">

    <style>
        :root { 
            --bg: #f8fbff; 
            --card: #ffffff; 
            --border: #e2e8f0; 
            --primary: #0077b6; 
            --accent: #00b4d8; 
            --text-main: #1e293b;
            --text-sub: #64748b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .btn-auth {
            position: relative;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 119, 182, 0.2);
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-auth:disabled { background: var(--text-sub); cursor: not-allowed; }

        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .btn-text { display: none; }
        .loading .btn-spinner { display: block; }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area span { font-size: 40px; }
        .logo-area h1 { font-size: 24px; color: var(--primary); margin: 10px 0 5px; }
        .logo-area p { font-size: 14px; color: var(--text-sub); margin: 0; }

        .tab-group {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
            color: var(--text-sub);
        }
        .tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        form { display: none; }
        form.active { display: block; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); background: #f0f9ff; }
        .footer-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 20px;
        }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-area">
        <span>💧</span>
        <h1>San Aqua Tech</h1>
        <p>Pure water, pure life.</p>
    </div>

    <div class="tab-group">
        <div class="tab active" id="tabLogin">Login</div>
        <div class="tab" id="tabSignup">Create Account</div>
    </div>

    <form id="loginForm" class="active">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUser" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-auth" id="loginBtn">
            <span class="btn-text">Sign In</span>
            <div class="btn-spinner"></div>
        </button>
        <p class="footer-text">Forgot password? <a href="forgot.html">Reset here</a></p>
    </form>

    <form id="signupForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Ex: John Doe" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="regPhone" placeholder="Enter 10 digit number" 
                   maxlength="10" 
                   pattern="[0-9]{10}" 
                   oninput="this.value = this.value.replace(/[^0-9]/g, '');" 
                   required>
        </div>

        <div class="form-group">
            <label>City / District</label>
            <select id="regCity" required>
                <option value="" disabled selected>Select your district</option>
                <option value="Ariyalur">Ariyalur</option>
                <option value="Chengalpattu">Chengalpattu</option>
                <option value="Chennai">Chennai</option>
                <option value="Coimbatore">Coimbatore</option>
                <option value="Cuddalore">Cuddalore</option>
                <option value="Dharmapuri">Dharmapuri</option>
                <option value="Dindigul">Dindigul</option>
                <option value="Erode">Erode</option>
                <option value="Kallakurichi">Kallakurichi</option>
                <option value="Kanchipuram">Kanchipuram</option>
                <option value="Kanyakumari">Kanyakumari</option>
                <option value="Karur">Karur</option>
                <option value="Krishnagiri">Krishnagiri</option>
                <option value="Madurai">Madurai</option>
                <option value="Mayiladuthurai">Mayiladuthurai</option>
                <option value="Nagapattinam">Nagapattinam</option>
                <option value="Namakkal">Namakkal</option>
                <option value="Nilgiris">Nilgiris</option>
                <option value="Perambalur">Perambalur</option>
                <option value="Pudukkottai">Pudukkottai</option>
                <option value="Ramanathapuram">Ramanathapuram</option>
                <option value="Ranipet">Ranipet</option>
                <option value="Salem">Salem</option>
                <option value="Sivaganga">Sivaganga</option>
                <option value="Tenkasi">Tenkasi</option>
                <option value="Thanjavur">Thanjavur</option>
                <option value="Theni">Theni</option>
                <option value="Thoothukudi">Thoothukudi</option>
                <option value="Tiruchirappalli">Tiruchirappalli</option>
                <option value="Tirunelveli">Tirunelveli</option>
                <option value="Tirupathur">Tirupathur</option>
                <option value="Tiruppur">Tiruppur</option>
                <option value="Tiruvallur">Tiruvallur</option>
                <option value="Tiruvannamalai">Tiruvannamalai</option>
                <option value="Tiruvarur">Tiruvarur</option>
                <option value="Vellore">Vellore</option>
                <option value="Viluppuram">Viluppuram</option>
                <option value="Virudhunagar">Virudhunagar</option>
            </select>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="regUser" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPass" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn-auth" id="signupBtn">
            <span class="btn-text">Create Account</span>
            <div class="btn-spinner"></div>
        </button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqyyGJt_t0ztknMudFVLmo6relkEa284g",
        authDomain: "meadi-aqua-tech.firebaseapp.com",
        databaseURL: "https://san-aqua-tech-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "meadi-aqua-tech",
        storageBucket: "meadi-aqua-tech.firebasestorage.app",
        messagingSenderId: "531151217708",
        appId: "1:531151217708:web:b30b6e1a0bf7fa60f29d89"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 1. MONITORING SECTION ---
    const user = localStorage.getItem("aquaUser") || "Guest";
    const currentPage = window.location.pathname.split("/").pop() || "index.html";
    const startTime = Date.now();

    try {
        const visitRef = ref(db, 'analytics/visits');
        push(visitRef, {
            username: user,
            page: currentPage,
            time: serverTimestamp(),
            device: navigator.userAgent
        });
    } catch(e) { console.error("Analytics Error", e); }

    window.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'hidden') {
            const duration = (Date.now() - startTime) / 1000;
            try {
                const exitRef = ref(db, 'analytics/exits');
                push(exitRef, {
                    username: user,
                    page: currentPage,
                    duration: duration.toFixed(1) + "s",
                    time: serverTimestamp()
                });
            } catch(e) { console.error("Exit Log Error", e); }
        }
    });

    // --- 2. UI TAB SWITCHING ---
    const switchTab = (type) => {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const tabL = document.getElementById('tabLogin');
        const tabS = document.getElementById('tabSignup');

        if(type === 'login') {
            tabL.classList.add('active'); tabS.classList.remove('active');
            loginForm.classList.add('active'); signupForm.classList.remove('active');
        } else {
            tabS.classList.add('active'); tabL.classList.remove('active');
            signupForm.classList.add('active'); loginForm.classList.remove('active');
        }
    };

    document.getElementById('tabLogin').onclick = () => switchTab('login');
    document.getElementById('tabSignup').onclick = () => switchTab('signup');

    // --- 3. SIGNUP LOGIC ---
    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('signupBtn');
        btn.classList.add('loading'); btn.disabled = true;

        const rawName = document.getElementById('regName').value.trim();
        const firstLetter = rawName.charAt(0).toUpperCase(); // பெயரின் முதல் எழுத்தை எடுக்கும்

        const regData = {
            user: document.getElementById('regUser').value.trim(),
            name: rawName,
            phone: document.getElementById('regPhone').value.trim(),
            city: document.getElementById('regCity').value,
            pass: document.getElementById('regPass').value,
            searchLetter: firstLetter // Customer List பிரிக்க உதவும்
        };

        try {
            const snapshot = await get(child(ref(db), `users/${regData.user}`));
            if (snapshot.exists()) {
                alert("❌ Username already taken!");
            } else {
                await set(ref(db, 'users/' + regData.user), regData);
                alert("🎉 Account Created! Please Login.");
                switchTab('login');
            }
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            btn.classList.remove('loading'); btn.disabled = false;
        }
    };

    // --- 4. LOGIN LOGIC ---
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.classList.add('loading'); btn.disabled = true;

        const userVal = document.getElementById('loginUser').value.trim();
        const passVal = document.getElementById('loginPass').value;

        try {
            const snapshot = await get(child(ref(db), `users/${userVal}`));
            if (snapshot.exists()) {
                const userData = snapshot.val();
                if (userData.pass === passVal) {
                    localStorage.setItem("isLoggedIn", "true");
                    localStorage.setItem("aquaUser", userData.user);
                    localStorage.setItem("aquaName", userData.name);
                    alert("Welcome " + userData.name);
                    window.location.href = 'index.html'; 
                } else {
                    alert("❌ Incorrect Password!");
                }
            } else {
                alert("❌ User not found!");
            }
        } catch (error) {
            alert("Connection Error. Please check your network.");
        } finally {
            btn.classList.remove('loading'); btn.disabled = false;
        }
    }; 
    
    // Copy-Paste Prevention
    document.addEventListener('selectstart', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return true;
        e.preventDefault();
    });
    document.addEventListener('copy', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return true;
        e.preventDefault();
    });
    document.addEventListener('contextmenu', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return true;
        e.preventDefault();
    });

    const authStyle = document.createElement('style');
    authStyle.innerHTML = `
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        input, select { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }
    `;
    document.head.appendChild(authStyle);
</script>

</body>
</html>
