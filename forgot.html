<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>San Aqua Tech | Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fbff; 
            --card: #ffffff; 
            --border: #e2e8f0; 
            --primary: #0077b6; 
            --accent: #00b4d8; 
            --text-main: #1e293b;
            --text-sub: #64748b;
            --success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-area span { font-size: 40px; }
        .logo-area h1 { font-size: 22px; color: var(--primary); margin: 10px 0 5px; font-weight: 800; }
        .logo-area p { font-size: 13px; color: var(--text-sub); margin: 0; }

        .step-indicator {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            background: #e0f2fe;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 0 auto 25px auto;
            display: table;
        }

        form { display: none; }
        form.active { display: block; }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: var(--primary); background: #f0f9ff; }

        .btn-auth {
            position: relative;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 119, 182, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-auth:disabled { background: var(--text-sub); cursor: not-allowed; }
        .btn-auth:hover:not(:disabled) { background: #005f94; }

        .btn-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .btn-text { display: none; }
        .loading .btn-spinner { display: block; }

        .footer-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 25px;
        }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-area">
        <span>🔐</span>
        <h1>Reset Password</h1>
        <p>Enter your details to recover your account</p>
    </div>

    <div class="step-indicator" id="stepBadge">Step 1: Account Verification</div>

    <form id="verifyForm" class="active">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="verifyUser" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="verifyPhone" placeholder="Enter registered 10 digit number" 
                   maxlength="10" 
                   pattern="[0-9]{10}" 
                   oninput="this.value = this.value.replace(/[^0-9]/g, '');" 
                   required>
        </div>
        <button type="submit" class="btn-auth" id="verifyBtn">
            <span class="btn-text">Verify Identity</span>
            <div class="btn-spinner"></div>
        </button>
        <p class="footer-text">Remembered your password? <a href="login.html">Sign In</a></p>
    </form>

    <form id="resetForm">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPass" placeholder="Enter new password" required>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPass" placeholder="Re-enter new password" required>
        </div>
        <button type="submit" class="btn-auth" id="resetBtn" style="background: var(--success); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);">
            <span class="btn-text">Update Password</span>
            <div class="btn-spinner"></div>
        </button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, get, child, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqyyGJt_t0ztknMudFVLmo6relkEa284g",
        authDomain: "meadi-aqua-tech.firebaseapp.com",
        databaseURL: "https://san-aqua-tech-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "meadi-aqua-tech",
        storageBucket: "meadi-aqua-tech.firebasestorage.app",
        messagingSenderId: "531151217708",
        appId: "1:531151217708:web:b30b6e1a0bf7fa60f29d89"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let targetUser = ""; 

    // --- 1. MONITORING SECTION ---
    const userLog = localStorage.getItem("aquaUser") || "Guest";
    try {
        push(ref(db, 'analytics/visits'), {
            username: userLog,
            page: "forgot.html",
            time: serverTimestamp(),
            device: navigator.userAgent
        });
    } catch(e) { console.error(e); }

    // --- 2. STEP 1: VERIFY IDENTITY ---
    document.getElementById('verifyForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('verifyBtn');
        btn.classList.add('loading'); btn.disabled = true;

        const inputUser = document.getElementById('verifyUser').value.trim();
        const inputPhone = document.getElementById('verifyPhone').value.trim();

        try {
            const snapshot = await get(child(ref(db), `users/${inputUser}`));
            if (snapshot.exists()) {
                const userData = snapshot.val();
                
                if (userData.phone === inputPhone) {
                    targetUser = inputUser; 
                    
                    document.getElementById('verifyForm').classList.remove('active');
                    document.getElementById('resetForm').classList.add('active');
                    
                    const badge = document.getElementById('stepBadge');
                    badge.innerText = "Step 2: New Password";
                    badge.style.background = "#dcfce7";
                    badge.style.color = "var(--success)";
                } else {
                    alert("❌ Entered phone number is incorrect!");
                }
            } else {
                alert("❌ Username not found!");
            }
        } catch (error) {
            alert("Connection error! Please try again.");
        } finally {
            btn.classList.remove('loading'); btn.disabled = false;
        }
    };

    // --- 3. STEP 2: UPDATE PASSWORD ---
    document.getElementById('resetForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('resetBtn');
        
        const newPass = document.getElementById('newPass').value;
        const confirmPass = document.getElementById('confirmPass').value;

        if (newPass !== confirmPass) {
            alert("❌ Passwords do not match!");
            return;
        }

        btn.classList.add('loading'); btn.disabled = true;

        try {
            await update(ref(db, `users/${targetUser}`), {
                pass: newPass
            });
            
            alert("🎉 Password updated successfully! Please login with your new password.");
            window.location.href = 'login.html'; 
        } catch (error) {
            alert("Failed to update password: " + error.message);
        } finally {
            btn.classList.remove('loading'); btn.disabled = false;
        }
    };

    // Copy-Paste Prevention
    document.addEventListener('selectstart', (e) => {
        if (e.target.tagName === 'INPUT') return true;
        e.preventDefault();
    });
    document.addEventListener('copy', (e) => {
        if (e.target.tagName === 'INPUT') return true;
        e.preventDefault();
    });
    document.addEventListener('contextmenu', (e) => {
        if (e.target.tagName === 'INPUT') return true;
        e.preventDefault();
    });

    const authStyle = document.createElement('style');
    authStyle.innerHTML = `
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        input { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }
    `;
    document.head.appendChild(authStyle);
</script>

</body>
</html>
